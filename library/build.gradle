apply plugin: 'com.android.library'

android {
	def compileVersion = project.properties['android.compileVersion'] != null ? project.properties['android.compileVersion'].toInteger() : null
	if (compileVersion == null) {
		if (useAndroidX) {
			compileVersion = 31
		} else {
			compileVersion = 28
		}
	}

	Boolean useAndroidX = project.properties['android.useAndroidX'] != null && project.properties['android.useAndroidX'].toBoolean()
	if (useAndroidX) {
		namespace = "com.flask.colorpicker"
	} else {
		compileSdkVersion compileVersion
		buildToolsVersion '28.0.3'
	}

	defaultConfig {
		if (useAndroidX) {
			compileSdk compileVersion
		}
		minSdkVersion 14
		//noinspection OldTargetApi,ExpiredTargetSdkVersion
		targetSdkVersion 28
		versionCode 1303
		versionName "0.0.13post3"
	}

	buildTypes {
		release {
			minifyEnabled false
			proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
		}
	}

	flavorDimensions "support_version"

	productFlavors {
		supportlib {
			dimension "support_version"
			//noinspection ExpiredTargetSdkVersion,OldTargetApi
			targetSdkVersion 28
			versionNameSuffix "-supportlib"
			testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"
		}
		androidx {
			dimension "support_version"
			//noinspection ExpiredTargetSdkVersion,OldTargetApi
			targetSdkVersion 30
			versionNameSuffix "-androidx"
			testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
		}
	}

	configurations {
		supportlibImplementation {}
		androidxImplementation {}
	}

	variantFilter { variant ->
		def names = variant.flavors*.name
		if (useAndroidX) {
			if (names.contains("supportlib")) {
				setIgnore(true)
			}
		} else if (!useAndroidX && (names.contains("androidx"))) {
			setIgnore(true)
		}
	}

	compileOptions {
		sourceCompatibility JavaVersion.VERSION_1_8
		targetCompatibility JavaVersion.VERSION_1_8
	}

}

dependencies {
	supportlibImplementation 'com.android.support:appcompat-v7:28.0.0'
	androidxImplementation 'androidx.appcompat:appcompat:1.3.1'

	testImplementation 'junit:junit:4.12'
	testImplementation 'com.google.android:android-test:4.1.1.4'

	Boolean useAndroidX = project.properties['android.useAndroidX'] != null && project.properties['android.useAndroidX'].toBoolean()
	if (useAndroidX)
	{
		testImplementation 'androidx.test:core:1.7.0'

		androidTestImplementation 'androidx.test:core:1.1.0'
		androidTestImplementation 'androidx.test:rules:1.2.0'
		androidTestImplementation 'androidx.test.ext:junit:1.1.5'
		androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'

	} else {
		androidTestImplementation 'com.android.support:support-annotations:28.0.0'
		androidTestImplementation 'com.android.support.test:runner:1.0.2'
		androidTestImplementation 'com.android.support.test:rules:0.5'
		androidTestImplementation 'com.android.support.test.espresso:espresso-core:3.0.2'
		androidTestImplementation 'com.android.support.test.uiautomator:uiautomator-v18:2.1.3'
	}
}
